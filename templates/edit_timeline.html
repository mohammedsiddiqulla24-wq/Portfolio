{% extends "base.html" %}
{% block title %}Edit Journey Entry{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            <div class="d-flex align-items-center justify-content-between mb-4">
                <h2 class="fw-bold m-0" style="color: var(--text);">Edit Entry</h2>
                <a href="/dashboard" class="btn btn-outline-secondary rounded-pill px-4 transition">Cancel</a>
            </div>

            <div class="card p-4 p-md-5 shadow-sm border-0" style="border-radius: var(--radius); background: var(--surface);">
                <form method="POST">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold" style="color: var(--muted);">Title</label>
                            <input type="text" name="title" class="form-control modern-input" value="{{ entry.title }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold" style="color: var(--muted);">Organization</label>
                            <input type="text" name="organization" class="form-control modern-input" value="{{ entry.organization }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" style="color: var(--muted);">Duration</label>
                        <input type="text" name="duration" class="form-control modern-input" value="{{ entry.duration }}" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold" style="color: var(--muted);">Description</label>
                        <textarea name="description" rows="4" class="form-control modern-input">{{ entry.description }}</textarea>
                    </div>

                    <button type="submit" class="btn btn-warning btn-lg w-100 rounded-pill fw-bold transition shadow-sm">
                        <i class="bi bi-save me-2"></i> Save Changes
                    </button>
                    
                </form>
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
