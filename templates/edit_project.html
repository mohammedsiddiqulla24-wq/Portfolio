{% extends "base.html" %}
{% block title %}Edit Project{% endblock %}

{% block content %}

<section class="dashboard-hero text-center py-5 mb-5 position-relative overflow-hidden">
    <div class="container position-relative z-1">
        <h1 class="fw-bold display-5">Edit Project</h1>
        <p class="mt-2 fs-5 mx-auto" style="color: rgba(255,255,255,0.8); max-width: 600px;">
            Update project details and keep your portfolio fresh.
        </p>
    </div>
</section>

<div class="row justify-content-center">
    <div class="col-lg-8">

        <div class="card p-4 p-md-5 shadow-sm border-0 mb-5" style="border-radius: var(--radius);">

            <form method="POST" enctype="multipart/form-data">

                <div class="mb-4">
                    <label class="form-label fw-semibold" style="color: var(--muted); font-size: 0.9rem;">Project Title</label>
                    <input type="text"
                           name="title"
                           value="{{ project['title'] }}"
                           class="form-control modern-input"
                           required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold" style="color: var(--muted); font-size: 0.9rem;">Description</label>
                    <textarea name="description"
                              class="form-control modern-input"
                              rows="5"
                              required>{{ project['description'] }}</textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold" style="color: var(--muted); font-size: 0.9rem;">Tech Stack (comma separated)</label>
                    <input type="text"
                           name="tech_stack"
                           value="{{ project['tech_stack'] }}"
                           class="form-control modern-input">
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold" style="color: var(--muted); font-size: 0.9rem;">GitHub Link</label>
                        <input type="text"
                               name="github_link"
                               value="{{ project['github_link'] }}"
                               class="form-control modern-input">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold" style="color: var(--muted); font-size: 0.9rem;">Live Link</label>
                        <input type="text"
                               name="live_link"
                               value="{{ project['live_link'] }}"
                               class="form-control modern-input">
                    </div>
                </div>

                <div class="mb-5">
                    <label class="form-label fw-semibold" style="color: var(--muted); font-size: 0.9rem;">Replace Images (Optional)</label>
                    <input type="file"
                           name="images"
                           class="form-control modern-input"
                           multiple>
                </div>

                <div class="d-flex justify-content-between align-items-center gap-3 flex-wrap">

                    <a href="/dashboard"
                       class="btn btn-outline-secondary btn-lg rounded-pill px-4 transition d-flex align-items-center">
                        <i class="bi bi-x-circle me-2"></i> Cancel
                    </a>

                    <button type="submit" class="btn btn-primary btn-lg rounded-pill px-4 fw-bold transition d-flex align-items-center">
                        <i class="bi bi-check2-circle me-2"></i> Update Project
                    </button>

                </div>

            </form>

        </div>

    </div>
</div>

{% endblock %}
